[project]
inputFiles = [ "src/**/*.argon" ]

[compiler-options]
moduleName = "Argon.Core"

[argon-module]
referenceModule = "Argon.Core.armodule"

[js]
# referenceModule = "js/Argon.Core.armodule"
outputFile = "js/Argon.Core.js"

[js.extern]
Int_to_s = """

function() {
	return createString(this[intValueSymbol].toString());
}

"""

puts = """

function (s) {
	console.log(s[stringValueSymbol]);
	return unitValue;
}

"""

[js.inject]
before = """

export const classConstructorSymbol = Symbol();

function createMethods(methodDescriptions, methods) {
	for(const description of methodDescriptions) {
		const methodInfo = Object.create(null);
		methodInfo.symbol = Symbol();
		methodInfo.value = description.value;
		Object.freeze(methodInfo)
		methods[description.descriptor] = methodInfo;
	}
}

export function createTrait(creator) {
	const trait = Object.create(null);

	trait.marker = Symbol();

	lazyProperty(trait, "baseTraits", function() {
		return creator.baseTraits || [];
	});

	const methods = Object.create(null);
	if(creator.methods) createMethods(creator.methods, methods);
	trait.methods = Object.freeze(methods);

	const traitStatic = Object.create(null);
	const staticMethods = Object.create(null);
	if(creator.staticMethods) createMethods(creator.staticMethods, staticMethods);
	traitStatic.methods = Object.freeze(staticMethods);
	trait.static = traitStatic;

	trait.create = function(...traitArgs) {
		const traitObj = Object.create(null);
		traitObj.marker = trait.marker;
		traitObj.typeArguments = Object.freeze(traitArgs);
		for(const desc in this.static.methods) {
			const methodInfo = this.static.methods[desc];
			traitObj[methodInfo.symbol] = methodInfo.value;
		}
		return traitObj;
	};

	return Object.freeze(trait);
}

export function createClass(creator) {
	const cls = Object.create(null);

	cls.marker = Symbol();

	lazyProperty(cls, "constructor", function() {

		const vtable = creator.vtable;

		return createClassConstructor(cls, creator.baseClass, ctorMap, function(proto) {
			const implTraits = creator.baseTraits;
			if(implTraits) {
				for(const trait of implTraits) {
					implementTrait(proto, cls, trait);
				}
			}
			implementMethods(proto, vtable);
		});
	});

	const ctors = Object.create(null);
	const ctorMap = Object.create(null);
	if(creator.constructors) {
		for(const ctor of creator.constructors) {
			const ctorInfo = Object.create(null);
			ctorInfo.symbol = Symbol();
			ctorInfo.function = ctor.value;
			ctors[ctor.descriptor] = Object.freeze(ctorInfo);
			ctorMap[ctorInfo.symbol] = ctor.value;
		}
	}
	cls.constructors = Object.freeze(ctors);
	Object.freeze(ctorMap);

	const fields = Object.create(null);
	if(creator.fields) {
		for(const field of creator.fields) {
			const fieldInfo = Object.create(null);
			fieldInfo.symbol = Symbol();
			fields[field.name] = Object.freeze(fieldInfo);
		}
	}
	cls.fields = fields;

	const methods = Object.create(null);
	if(creator.methods) createMethods(creator.methods, methods);
	cls.methods = Object.freeze(methods);

	const clsStatic = Object.create(null);
	const staticMethods = Object.create(null);
	if(creator.staticMethods) createMethods(creator.staticMethods, staticMethods);
	clsStatic.methods = Object.freeze(staticMethods);
	cls.static = clsStatic;

	cls.create = function(...classArgs) {
		const clsObj = Object.create(null);
		clsObj.classPrototype = cls.constructor;
		clsObj.marker = cls.marker;
		clsObj.typeArguments = Object.freeze(classArgs);
		for(const desc in this.static.methods) {
			const methodInfo = this.static.methods[desc];
			clsObj[methodInfo.symbol] = methodInfo.value;
		}
		return Object.freeze(clsObj);
	};

	return Object.freeze(cls);
}

export function createDataConstructor(creator) {
	const dataCtor = Object.create(null);

	dataCtor.marker = Symbol();

	lazyProperty(dataCtor, "constructor", function() {

		const vtable = creator.vtable;
		const ctor = creator.constructor;

		function func(...args) {
			this[dataCtor.marker] = function() { return dataCtor.create(...args) };
			ctor.call(this, ...args);
		}

		func.prototype = Object.create(null);

		implementTrait(func.prototype, dataCtor, creator.instanceType);
		implementMethods(func.prototype, vtable);

		Object.freeze(func.prototype);
		return Object.freeze(func);
	});


	const properties = Object.create(null);
	if(creator.properties) {
		for(const prop of creator.properties) {
			const propInfo = Object.create(null);
			propInfo.symbol = Symbol();
			properties[prop.name] = Object.freeze(propInfo);
		}
	}
	dataCtor.properties = properties;

	const methods = Object.create(null);
	if(creator.methods) createMethods(creator.methods, methods);
	dataCtor.methods = Object.freeze(methods);

	dataCtor.create = function(...args) {
		const ctorObj = Object.create(null);
		ctorObj.dataCtorPrototype = dataCtor.constructor;
		ctorObj.typeArguments = Object.freeze(args);
		return Object.freeze(ctorObj);
	};

	return Object.freeze(dataCtor);
}

function lazyProperty(obj, name, valueFunc) {
	let value;
	Object.defineProperty(obj, name, {
		get() {
			if(value === undefined) {
				value = valueFunc();
			}
			return value;
		}
	});
}

function createClassConstructor(cls, baseClass, ctors, init) {
	const func = function(classType, ctorId, ...args) {
		this[cls.marker] = function() { return classType };
		ctors[ctorId].call(this, ...args);
	};

	if(baseClass) {
		func.prototype = Object.create(baseClass.class.constructor);
		func.prototype[baseClass.class.marker] = function() {
			return baseClass.createClassObj(this[cls.marker]());
		};
	}
	else func.prototype = Object.create(null);

	init(func.prototype);
	Object.freeze(func.prototype);
	return Object.freeze(func);
}

function implementTrait(obj, childType, trait) {
	if(trait.trait.marker in obj) {
		return;
	}

	obj[trait.trait.marker] = function() {
		return trait.createTraitObj(this[childType.marker]());
	};

	for(const baseTrait of trait.trait.baseTraits) {
		implementTrait(obj, trait.trait, baseTrait);
	}
}

function implementMethods(obj, vtable) {
	for(const entry of vtable) {
		obj[entry.symbol] = entry.value;
	}
}

function isSameArgValue(a, b) {
	if(a instanceof Array && a.length === 1) {
		return isSameArgValue(a[0], b);
	}

	if(typeof(b) === "object") {
		if(b instanceof Array) {
			if(b.length === 1) {
				return isSameArgValue(a, b[0]);
			}

			if(!(b instanceof Array)) {
				return false;
			}

			for(let i = 0; i < t.length; ++i) {
				if(!isSameArgValue(obj[i], t[i])) {
					return false;
				}
			}
			return true;
		}
		else if("marker" in b) {
			if(typeof(a) !== "object" || !("marker" in a) || a.marker !== b.marker) {
				return false;
			}

			if(b.typeArguments.length !== a.typeArguments.length) {
				return false;
			}

			for(let i = 0; i < b.typeArguments.length; ++i) {
				if(!isSameArgValue(a.typeArguments[i], b.typeArguments[i])) {
					return false;
				}
			}

			return true;
		}
	}
}

export function isInstanceOf(obj, t) {
	if(typeof(t) === "object") {
		if(t instanceof Array) {
			if(t.length === 1) {
				return isInstanceOf(obj, t[0]);
			}
			else {
				if(!(obj instanceof Array) || obj.length !== t.length) {
					return false;
				}
				for(let i = 0; i < t.length; ++i) {
					if(!isInstanceOf(obj[i], t[i])) {
						return false;
					}
				}
				return true;
			}
		}
		else if("marker" in t) {
			if(!(t.marker in obj)) {
				return false;
			}

			const instT = obj[t.marker]();

			if(instT.typeArguments.length !== t.typeArguments.length) {
				return false;
			}

			for(let i = 0; i < instT.typeArguments.length; ++i) {
				if(!isSameArgValue(instT.typeArguments[i], t.typeArguments[i])) {
					return false;
				}
			}

			return true;
		}
	}

	throw new Error("Unexpected type");
}


const stringValueSymbol = Symbol();
const intValueSymbol = Symbol();
export const boolValueSymbol = Symbol();


"""

after = """

export const unitValue = Object.freeze(Object.create(classes["Ar.Unit:"].constructor.prototype));

export function createString(str) {
	const obj = Object.create(classes["Ar.String:"].constructor.prototype);
	obj[stringValueSymbol] = str;
	return Object.freeze(obj);
};

export function createInt(i) {
	const obj = Object.create(classes["Ar.Int:"].constructor.prototype);
	obj[intValueSymbol] = i;
	return Object.freeze(obj);
}

export function createBool(b) {
	const obj = Object.create(classes["Ar.Bool:"].constructor.prototype);
	obj[boolValueSymbol] = b;
	return Object.freeze(obj);
}

export function addInt(a, b) {
	return createInt(a[intValueSymbol] + b[intValueSymbol]);
}

export function subInt(a, b) {
	return createInt(a[intValueSymbol] - b[intValueSymbol]);
}

export function mulInt(a, b) {
	return createInt(a[intValueSymbol] * b[intValueSymbol]);
}

export function intEqual(a, b) {
	return createBool(a[intValueSymbol] === b[intValueSymbol]);
}


"""
