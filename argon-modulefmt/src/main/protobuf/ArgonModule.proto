syntax = "proto2";

import "google/protobuf/empty.proto";
import "scalapb/scalapb.proto";

option (scalapb.options) = {
    scope: FILE
    package_name: "dev.argon.module"
    flat_package: true
    collection_type: "scala.collection.immutable.Vector"
    preserve_unknown_fields: false
};

// File Formats

// argon-metadata
message Metadata {
    required int32 formatVersion = 1;
    required string name = 2;
    required ModuleType moduleType = 5;

    repeated ModuleReference references = 9;
    repeated GlobalDeclaration globalTraits = 10;
    repeated GlobalDeclaration globalClasses = 11;
    repeated GlobalDeclaration globalDataConstructors = 12;
    repeated GlobalDeclaration globalFunctions = 13;
}

enum ModuleType {
    ReferenceModule = 0;
    DefinitionModule = 1;
}

message ModuleReference {
    required string name = 1;
}

message GlobalDeclaration {
    required uint32 id = 1;
    required AccessModifier accessModifier = 2;
}

message FileID {
    required int32 id = 1;
}

// *-ref/id
message TraitReference {
    required TraitOwner owner = 1;
    required ErasedSignatureParameterOnly signature = 2;
}

message ClassReference {
    required ClassOwner owner = 1;
    required ErasedSignatureParameterOnly signature = 2;
}

message DataConstructorReference {
    required DataConstructorOwner owner = 1;
    required ErasedSignatureParameterOnly signature = 2;
}

message FunctionReference {
    required FunctionOwner owner = 1;
    required ErasedSignature signature = 2;
}

message MethodReference {
    required MethodOwner owner = 1;
    required MethodName name = 2;
    required ErasedSignature signature = 3;
}

message ClassConstructorReference {
    required sint32 ownerClass = 1;
    required ErasedSignatureParameterOnly signature = 2;
}

// */id
message MethodMember {
    required int32 id = 1;
    required AccessModifier accessModifier = 2;
}

message TraitDefinition {
    required TraitOwner owner = 1;
    required FileID fileId = 6;
    required TraitSignature signature = 2;
    optional bool isSealed = 3;
    repeated MethodMember methods = 4;
    repeated MethodMember staticMethods = 5;
}

message ClassDefinition {
    required ClassOwner owner = 1;
    required FileID fileId = 10;
    required ClassSignature signature = 2;
    optional bool isOpen = 3;
    optional bool isSealed = 4;
    optional bool isAbstract = 5;
    repeated ClassField fields = 6;
    repeated MethodMember methods = 7;
    repeated MethodMember staticMethods = 8;
    repeated MethodMember constructors = 9;
}

message ClassField {
    required Mutability mutability = 1;
    required string name = 2;
    required Expression fieldType = 3;
}

message DataConstructorDefinition {
    required DataConstructorOwner owner = 1;
    required FileID fileId = 2;
    required DataConstructorSignature signature = 3;
    repeated MethodMember methods = 4;
}

message EffectInfo {
    required bool isPure = 1;
}

message FunctionDefinition {
    required FunctionOwner owner = 1;
    required FileID fileId = 2;
    required FunctionSignature signature = 3;
    required EffectInfo effects = 4;
    optional FunctionBody body = 5;
}

message FunctionBody {
    oneof bodyType {
        Expression expressionBody = 1;
        uint32 externalImplementation = 2;
    }
}

message MethodName {
    oneof name {
        string normal = 1;
        string mutator = 2;
        SpecialMethodName specialName = 3;
    }
}

message MethodDefinition {
    required MethodOwner owner = 1;
    required MethodName name = 2;
    required FileID fileId = 3;
    required MethodSignature signature = 4;
    required EffectInfo effects = 5;
    optional bool isVirtual = 6;
    optional bool isAbstract = 7;
    optional bool isImplicitOverride = 8;
    optional bool isFinal = 9;
    optional FunctionBody body = 10;
}

message ClassConstructorDefinition {
    required sint32 ownerClass = 1;
    required FileID fileId = 2;
    required ClassConstructorSignature signature = 3;
    required EffectInfo effects = 4;
    optional ClassConstructorBody body = 5;
}

message PreInitClassConstructorStatement {
    optional FieldVariable field = 1;
    required Expression expr = 2;
}

message BaseClassConstructorCall {
    required sint32 baseConstructorId = 1;
    required ClassType instanceClassType = 2;
    repeated Expression args = 3;
}

message ClassConstructorExpressionBody {
    repeated PreInitClassConstructorStatement preInitStatements = 1;
    optional BaseClassConstructorCall baseConstructorCall = 2;
    required Expression endExpr = 3;
}

message ClassConstructorBody {
    oneof bodyType {
        ClassConstructorExpressionBody expressionBody = 1;
        uint32 externalImplementation = 2;
    }
}

// Shared types

// Simple types
message FileSpec {
    required int32 id = 1;
    required string name = 2;
}

message Namespace {
    repeated string path = 1;
}

message GlobalName {
    oneof globalName {
        string normalName = 1;
        string operator = 3;
        int32 unnamed = 2;
    }
}

message BigInt {
    oneof intType {
        sint32 signed32 = 1;
        sfixed64 signed64 = 2;
        bytes bigint = 3;
    }
}

enum AccessModifier {
    Public = 1;
    Internal = 2;
    Protected = 3;
    ProtectedInternal = 4;
    Private = 5;
    PrivateInternal = 6;
}

enum Mutability {
    Mutable = 1;
    NonMutable = 2;
}

enum SpecialMethodName {
    Unnamed = 0;
    Call = 1;
}

// Owners
message ByNamespaceOwner {
    optional uint32 module = 1;
    required Namespace ns = 2;
    required GlobalName name = 3;
}

message TraitOwner {
    oneof owner {
        ByNamespaceOwner inNamespace = 1;
    }
}

message ClassOwner {
    oneof owner {
        ByNamespaceOwner inNamespace = 1;
    }
}

message DataConstructorOwner {
    oneof owner {
        ByNamespaceOwner inNamespace = 1;
    }
}

message FunctionOwner {
    oneof owner {
        ByNamespaceOwner inNamespace = 1;
    }
}

message MethodOwner {
    oneof owner {
        sint32 byClass = 1;
        sint32 byClassObject = 2;
        sint32 byTrait = 3;
        sint32 byTraitObject = 4;
        sint32 byDataConstructor = 5;
    }
}

message LocalVariableOwner {
    oneof owner {
        sint32 byClass = 2;
        sint32 byTrait = 3;
        sint32 byDataConstructor = 4;
        sint32 byFunction = 5;
        sint32 byMethod = 6;
        sint32 byClassConstructor = 7;
    }
}

message ParameterVariableOwner {
    oneof owner {
        sint32 byClass = 2;
        sint32 byTrait = 3;
        sint32 byDataConstructor = 4;
        sint32 byFunction = 5;
        sint32 byMethod = 6;
        sint32 byClassConstructor = 7;
    }
}

// Types
message VariableName {
    oneof name {
        string normal = 1;
        google.protobuf.Empty unnamed = 2;
    }
}

message LocalVariable {
    required uint32 id = 1;
    required LocalVariableOwner owner = 2;
    required VariableName name = 3;
    required Mutability mutability = 4;
    required Expression varType = 5;
    optional bool isErased = 6 [default = false];
}

message FieldVariable {
    required sint32 ownerClass = 1;
    required VariableName name = 2;
    required Mutability mutability = 3;
    required Expression varType = 4;
}

message ParameterVariable {
    required ParameterVariableOwner owner = 1;
    required uint32 index = 2;
    required VariableName name = 3;
    required Mutability mutability = 4;
    required Expression varType = 5;
    optional bool isErased = 6 [default = false];
}

message Variable {
    oneof variableType {
        LocalVariable local = 1;
        FieldVariable field = 2;
        ParameterVariable param = 3;
    }
}

message TupleElement {
}

message TupleMetadata {
    repeated TupleElement elements = 1;
}

message DataDeconstructPattern {
    required sint32 dataConstructorId = 1;
    repeated PatternExpr args = 2;
}

message PatternExpr {
    oneof pattern {
        DataDeconstructPattern dataDeconstructor = 1;
        LocalVariable binding = 2;
        LocalVariable castBinding = 3;
    }
}

message PatternMatch {
    repeated PatternExpr patterns = 1;
}

enum PrimitiveOperation {
    AddInt = 1;
    SubInt = 2;
    MulInt = 3;
    IntEqual = 4;
}

message UniversePair {
    required UniverseExpr a = 1;
    required UniverseExpr b = 2;
}

message UniverseExpr {
    oneof exprType {
        BigInt fixed = 1;
        google.protobuf.Empty abstractUniverse = 2;
        UniversePair largestUniverse = 3;
        UniverseExpr nextLargestUniverse = 4;
        UniverseExpr previousUniverse = 5;
    }
}

message TypeN {
    required UniverseExpr universe = 1;
    optional Expression subtypeConstraint = 2;
    optional Expression supertypeConstraint = 3;
}

message Expression {
    oneof exprType {
        sint32 traitType = 3;
        sint32 classType = 4;
        sint32 dataConstructorType = 5;
        google.protobuf.Empty typeOfType = 6;
        TypeN typeN = 7;
        google.protobuf.Empty functionType = 8;
        google.protobuf.Empty unionType = 9;
        google.protobuf.Empty intersectionType = 10;
        LocalVariable existentialType = 11;

        sint32 classConstructorCall = 106; // First type arg is the class type
        google.protobuf.Empty dataConstructorCall = 107; // First type arg is the data constructor type
        google.protobuf.Empty ensureExecuted = 108; // First arg is the body, second is the ensuring expression
        sint32 functionCall = 109;
        google.protobuf.Empty functionObjectCall = 110; // first arg is the function, second is the argument, third is the return type
        google.protobuf.Empty ifElse = 111; // First arg is the condition, second is the true body, third is false body
        LocalVariable letBinding = 112; // First arg is value, second is the expression with the variable bound
        bool loadConstantBool = 113; // First arg is the type
        BigInt loadConstantInt = 114; // First arg is the type
        string loadConstantString = 115; // First arg is the type
        LocalVariable loadLambda = 116; // First arg is the body
        TupleMetadata loadTuple = 117; // Args must correspond to elements.
        uint32 loadTupleElement = 118; // Index of the element to load. First is the tuple value, second is the type of the element.
        google.protobuf.Empty loadUnit = 119; // First is the type
        Variable loadVariable = 120;
        sint32 methodCall = 121; // First is the instance object, second is the instance type, rest are method args
        PatternMatch patternMatch = 122; // First arg is the matched value, patterns must correspond to remaining args
        PrimitiveOperation primitiveOp = 123; // First arg is the type, rest are operation args
        google.protobuf.Empty sequence = 124; // Args are executed in sequence (must be non-empty)
        Variable storeVariable = 125; // First arg is the type of the expression (e.g. Unit), second is the value stored in the variable
    }

    repeated Expression args = 1;
}

message TraitType {
    required sint32 traitId = 1;
    repeated Expression typeArguments = 2;
}

message ClassType {
    required sint32 classId = 1;
    repeated Expression typeArguments = 2;
}

message DataConstructorType {
    required sint32 constructorId = 1;
    repeated Expression typeArguments = 2;
}

message Wildcard {}

// Signature
message ParameterElement {
    optional string name = 1;
    required Expression paramType = 2;
}

enum ParameterStyle {
	Normal = 1;
	Inferrable = 2;
}

message Parameter {
	optional ParameterStyle style = 2;
    optional bool isErased = 3 [default = false];
    repeated ParameterElement elements = 1;
}

message TraitSignature {
    repeated Parameter parameters = 1;
    repeated TraitType baseTraits = 2;
}

message ClassSignature {
    repeated Parameter parameters = 1;
    optional ClassType baseClass = 2;
    repeated TraitType baseTraits = 3;
}

message DataConstructorSignature {
    repeated Parameter parameters = 1;
    required TraitType instanceType = 2;
}

message FunctionSignature {
    repeated Parameter parameters = 1;
    required Expression returnType = 2;
}

message MethodSignature {
    repeated Parameter parameters = 1;
    required Expression returnType = 2;
}

message ClassConstructorSignature {
    repeated Parameter parameters = 1;
}


// Erased Signature
message SigType {
    oneof sigType {
        google.protobuf.Empty empty = 1;
        SigTypeClass classType = 2;
        SigTypeTrait traitType = 3;
        SigTypeDataConstructor dataCtorType = 4;
        SigTypeTuple tupleType = 5;
        SigTypeFunction functionType = 6;
    }
}

message SigTypeClass {
    required sint32 classId = 1;
    repeated SigType typeArguments = 2;
}

message SigTypeTrait {
    required sint32 traitId = 1;
    repeated SigType typeArguments = 2;
}

message SigTypeDataConstructor {
    required sint32 ctorId = 1;
    repeated SigType typeArguments = 2;
}

message SigTypeTuple {
    repeated SigType elements = 1;
}

message SigTypeFunction {
    required SigType argumentType = 1;
    required SigType resultType = 2;
}

message ErasedSignatureParameterOnly {
    repeated SigType parameterTypes = 1;
}

message ErasedSignature {
    repeated SigType parameterTypes = 1;
    required SigType resultType = 2;
}
