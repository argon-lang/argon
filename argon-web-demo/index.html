<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Argon Demo</title>
</head>
<body>

<script>

    const worker = new Worker("./worker.js");
    worker.onmessage = function(e) {
        console.log("Web page received message");
    };

    worker.postMessage({
        entryPoint: "Test",
        modules: [{name: "Argon.Core", code: "Hi"}],
    });

    console.log("postMessage called");

</script>

</body>
</html>
